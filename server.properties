process.roles=broker,controller
node.id=1
controller.quorum.voters=1@localhost:9094

listeners=SASL_SSL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
advertised.listeners=SASL_SSL://server.bazzario.in:9093
controller.listener.names=CONTROLLER
inter.broker.listener.name=SASL_SSL
listener.security.protocol.map=CONTROLLER:PLAINTEXT,SASL_SSL:SASL_SSL

sasl.enabled.mechanisms=PLAIN
sasl.mechanism.inter.broker.protocol=PLAIN

ssl.client.auth=none
ssl.keystore.location=/etc/kafka/ssl/kafka.keystore.jks
ssl.keystore.password=admin@123
ssl.key.password=admin@123
ssl.truststore.location=/etc/kafka/ssl/kafka.truststore.jks
ssl.truststore.password=admin@123
ssl.keystore.type=PKCS12
ssl.truststore.type=PKCS12
log.dirs=/var/lib/kafka/data
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1